<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Navy rounded background -->
  <rect width="180" height="180" rx="36" fill="#1a1a3e"/>
  <!-- Subtle glow behind star -->
  <circle cx="90" cy="90" r="52" fill="url(#glow)" opacity="0.35"/>
  <!-- Golden 5-pointed star -->
  <path d="M90 30 L102.9 68.2 L142.3 69 L110.9 92.8 L122.3 130.5 L90 108 L57.7 130.5 L69.1 92.8 L37.7 69 L77.1 68.2 Z"
        fill="url(#starGrad)" filter="url(#shadow)"/>
  <!-- Small sparkle top-right -->
  <circle cx="136" cy="44" r="5" fill="#f5c842" opacity="0.8"/>
  <circle cx="44" cy="50" r="3.5" fill="#80d4f5" opacity="0.7"/>
  <circle cx="148" cy="118" r="3" fill="#b89de0" opacity="0.7"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </radialGradient>
    <linearGradient id="starGrad" x1="37.7" y1="30" x2="142.3" y2="130.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#f0a832"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#f5c842" flood-opacity="0.5"/>
    </filter>
  </defs>
</svg>
