<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>%VITE_APP_TITLE%</title>
    <meta name="description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="robots" content="index, follow" />
    <!-- Open Graph -->
    <meta property="og:title" content="%VITE_APP_TITLE%" />
    <meta property="og:description" content="%VITE_APP_DESCRIPTION%" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:site_name" content="%VITE_APP_NAME%" />
    <meta property="og:image" content="%VITE_SITE_URL%/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="%VITE_APP_TITLE%" />
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_APP_TITLE%" />
    <meta name="twitter:description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og-image.png" />
    <meta name="twitter:image:alt" content="%VITE_APP_TITLE%" />
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "%VITE_APP_NAME%",
          "description": "%VITE_APP_DESCRIPTION%",
          "applicationCategory": "EducationalApplication",
          "operatingSystem": "%VITE_APP_OS%",
          "audience": {
            "@type": "EducationalAudience",
            "educationalRole": "student",
            "suggestedMinAge": "%VITE_APP_MIN_AGE%",
            "suggestedMaxAge": "%VITE_APP_MAX_AGE%"
          },
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "url": "%VITE_SITE_URL%/"
        },
        {
          "@type": "Organization",
          "name": "%VITE_APP_NAME%",
          "url": "%VITE_SITE_URL%/",
          "logo": "%VITE_SITE_URL%/og-image.png",
          "description": "Makers of %VITE_APP_NAME%, the AI-powered pronunciation learning companion for children."
        }
      ]
    }
    </script>
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
